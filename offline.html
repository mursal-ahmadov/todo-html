<!DOCTYPE html>
<html lang="az" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo — Offline</title>
  <link rel="icon" href="/todo-html/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/glass.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
</head>
<body>
  <main style="min-height:100svh;display:flex;align-items:center;justify-content:center;padding:var(--s-6)">
    <div class="glass animate-fade-up" style="max-width:400px;width:100%;padding:var(--s-8);text-align:center;border-radius:var(--r-2xl)">
      <div style="font-size:64px;margin-bottom:var(--s-4)" role="img" aria-label="Offline">📡</div>
      <h1 style="font-size:var(--fs-xl);font-weight:700;margin-bottom:var(--s-3);color:var(--text-primary)">İnternet yoxdur</h1>
      <p style="color:var(--text-secondary);font-size:var(--fs-sm);line-height:1.6;margin-bottom:var(--s-6)">
        Hazırda internet bağlantısı yoxdur. Bağlantı bərpa olunduqda avtomatik sinxronizasiya ediləcək.
      </p>
      <button onclick="window.location.reload()" class="btn btn-primary">
        Yenidən yoxla
      </button>
    </div>
  </main>
</body>
</html>
