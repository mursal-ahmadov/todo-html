<!DOCTYPE html>
<html lang="az" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo — Giriş</title>
  <meta name="description" content="Şəxsi todo tətbiqi — GitHub ilə sinxronizasiya">
  <link rel="manifest" href="/todo-html/manifest.webmanifest">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Todo">
  <link rel="apple-touch-icon" href="/todo-html/assets/icons/icon-192.png">
  <link rel="icon" href="/todo-html/assets/favicon.svg" type="image/svg+xml">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/glass.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/pages/auth.css">

  <script type="importmap">
  {
    "imports": {
      "dayjs":       "https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js",
      "marked":      "https://cdn.jsdelivr.net/npm/marked@11/lib/marked.esm.js",
      "chart.js/auto": "https://cdn.jsdelivr.net/npm/chart.js@4/auto/auto.js",
      "sortablejs":  "https://cdn.jsdelivr.net/npm/sortablejs@1/modular/sortable.esm.js"
    }
  }
  </script>
</head>
<body>
  <main class="auth-page" id="auth-root">

    <!-- Setup view (first time) -->
    <div id="setup-view" class="auth-card glass animate-fade-up" hidden>
      <div class="auth-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="48" height="48" rx="14" fill="url(#g)"/>
          <path d="M14 25l8 8 14-16" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="g" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366f1"/><stop offset="1" stop-color="#ec4899"/>
          </linearGradient></defs>
        </svg>
        <h1 class="gradient-text">Todo</h1>
      </div>

      <p class="auth-subtitle">GitHub token-inizi daxil edib şifrə qurun.</p>

      <form id="setup-form" class="auth-form" novalidate>
        <div class="flex-col gap-2">
          <label class="input-label" for="token-input">GitHub Token
            <a href="https://github.com/settings/tokens/new?description=todo-app&scopes=repo" target="_blank" rel="noopener noreferrer" style="font-size:var(--fs-xs);color:var(--accent);margin-left:var(--s-2)">Yeni yarat ↗</a>
          </label>
          <input id="token-input" class="input" type="password" autocomplete="off" placeholder="ghp_…" required>
        </div>

        <div class="flex-col gap-2">
          <label class="input-label" for="repo-name">Data repo adı</label>
          <input id="repo-name" class="input" type="text" value="todo-data" autocomplete="off">
          <label class="flex gap-2 align-center" style="font-size:var(--fs-sm);color:var(--text-secondary);cursor:pointer">
            <input id="create-repo" type="checkbox" class="checkbox" checked>
            Repo mövcud deyilsə özü yarsın
          </label>
        </div>

        <div class="flex-col gap-2">
          <label class="input-label" for="passphrase-input">Şifrə (passphrase)</label>
          <input id="passphrase-input" class="input" type="password" autocomplete="new-password" placeholder="Güclü şifrə daxil edin…" required>
          <div id="strength-bar" class="passphrase-strength" data-strength=""></div>
        </div>

        <div class="flex-col gap-2">
          <label class="input-label" for="passphrase-confirm">Şifrəni təsdiqlə</label>
          <input id="passphrase-confirm" class="input" type="password" autocomplete="new-password" placeholder="Yenidən daxil edin…" required>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:var(--s-2)">Başla →</button>
      </form>
    </div>

    <!-- Unlock view (returning user) -->
    <div id="unlock-view" class="auth-card glass animate-fade-up" hidden>
      <div class="auth-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="48" height="48" rx="14" fill="url(#g2)"/>
          <path d="M14 25l8 8 14-16" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="g2" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366f1"/><stop offset="1" stop-color="#ec4899"/>
          </linearGradient></defs>
        </svg>
        <h1 class="gradient-text">Todo</h1>
      </div>

      <p class="auth-subtitle">Şifrənizi daxil edib davam edin.</p>

      <form id="unlock-form" class="auth-form" novalidate>
        <div class="flex-col gap-2">
          <label class="input-label" for="unlock-passphrase">Şifrə</label>
          <input id="unlock-passphrase" class="input" type="password" autocomplete="current-password" placeholder="Şifrənizi daxil edin…" autofocus required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:var(--s-2)">Aç →</button>
      </form>

      <button id="auth-logout" class="btn btn-ghost btn-sm" style="margin-top:var(--s-4)">Sıfırla (yeni hesab)</button>
    </div>
  </main>

  <script type="module" src="js/pages/index.init.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/todo-html/service-worker.js').catch(console.error);
    }
  </script>
</body>
</html>
