<!DOCTYPE html>
<html lang="az" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo — Tasklar</title>
  <meta name="description" content="Task idarəetmə səhifəsi">
  <link rel="manifest" href="/todo-html/manifest.webmanifest">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Todo">
  <link rel="apple-touch-icon" href="/todo-html/assets/icons/icon-192.png">
  <link rel="icon" href="/todo-html/assets/favicon.svg" type="image/svg+xml">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/glass.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/pages/app.css">

  <script type="importmap">
  {
    "imports": {
      "dayjs":       "https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js",
      "marked":      "https://cdn.jsdelivr.net/npm/marked@11/lib/marked.esm.js",
      "chart.js/auto": "https://cdn.jsdelivr.net/npm/chart.js@4/auto/auto.js",
      "sortablejs":  "https://cdn.jsdelivr.net/npm/sortablejs@1/modular/sortable.esm.js"
    }
  }
  </script>
</head>
<body>
  <div class="app-shell">
    <!-- Nav injected by injectNav() -->
    <div id="nav-root"></div>

    <div class="page-with-sidebar">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar" aria-label="Kateqoriyalar">
        <div class="sidebar-section-title">Görünüş</div>
        <button class="sidebar-item active" data-filter="today">
          <span class="sidebar-item-icon">☀️</span>
          <span class="sidebar-item-label">Bu gün</span>
          <span class="sidebar-item-count">0</span>
        </button>
        <button class="sidebar-item" data-filter="week">
          <span class="sidebar-item-icon">📅</span>
          <span class="sidebar-item-label">Bu həftə</span>
          <span class="sidebar-item-count">0</span>
        </button>
        <button class="sidebar-item" data-filter="overdue">
          <span class="sidebar-item-icon">⚠️</span>
          <span class="sidebar-item-label">Gecikmiş</span>
          <span class="sidebar-item-count">0</span>
        </button>
        <button class="sidebar-item" data-filter="all">
          <span class="sidebar-item-icon">📋</span>
          <span class="sidebar-item-label">Hamısı</span>
          <span class="sidebar-item-count">0</span>
        </button>
        <button class="sidebar-item" data-filter="completed">
          <span class="sidebar-item-icon">✅</span>
          <span class="sidebar-item-label">Tamamlanmış</span>
          <span class="sidebar-item-count">0</span>
        </button>

        <div class="divider" style="margin:var(--s-3) 0;"></div>

        <div class="sidebar-section-title" style="display:flex;align-items:center;justify-content:space-between;">
          Kateqoriyalar
          <button id="add-category-btn" class="btn-icon" aria-label="Kateqoriya əlavə et" style="font-size:18px;color:var(--text-muted)">+</button>
        </div>
        <div id="sidebar-category-list"></div>
      </aside>

      <!-- Main content -->
      <main class="main-content" role="main">
        <!-- Quick-add bar -->
        <div class="quick-add glass-sm">
          <input id="quick-input" class="input" type="text" placeholder="Yeni task əlavə et… (#teq @kateqoriya sabah 14:00)" autocomplete="off">
          <button id="quick-add-btn" class="btn btn-icon-round btn-primary" aria-label="Əlavə et">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>

        <!-- Search + View toggle -->
        <div class="flex gap-3 align-center" style="margin-bottom:var(--s-4)">
          <div class="input-group" style="flex:1">
            <span class="input-group-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input id="search-input" class="input input-sm" type="search" placeholder="Axtar… (/)">
          </div>
          <div class="flex gap-1">
            <button class="btn btn-sm btn-ghost" data-view="list" title="Siyahı görünüşü">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
            </button>
            <button class="btn btn-sm btn-ghost" data-view="kanban" title="Kanban görünüşü">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="15" rx="1"/></svg>
            </button>
            <button class="btn btn-sm btn-ghost" data-view="calendar" title="Təqvim görünüşü">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </button>
          </div>
        </div>

        <!-- Task list container -->
        <div id="task-list" role="list" aria-label="Tasklar"></div>

        <!-- FAB -->
        <button id="fab-new-task" class="btn btn-primary" aria-label="Yeni task"
          style="position:fixed;bottom:var(--s-6);right:var(--s-6);border-radius:var(--r-full);padding:var(--s-3) var(--s-5);box-shadow:var(--shadow-xl);display:flex;align-items:center;gap:var(--s-2);z-index:var(--z-toast)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Yeni task
        </button>
      </main>
    </div>
  </div>

  <script type="module" src="js/pages/app.init.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/todo-html/service-worker.js').catch(console.error);
    }
  </script>
</body>
</html>
